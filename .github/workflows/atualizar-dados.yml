п»їname: RespirAlert SC Гўв‚¬вЂќ AtualizaГѓВ§ГѓВЈo AutomГѓВЎtica de Dados

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

jobs:
  atualizar-dados:
    name: Coletar, Processar e Publicar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependГѓВЄncias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pysus 2>/dev/null || pip install requests pandas
          echo "DependГѓВЄncias instaladas"

      - name: Coletar internaГѓВ§ГѓВµes DATASUS
        run: |
          cd scripts
          python coleta_datasus.py

      - name: Coletar dados climГѓВЎticos INMET
        env:
          INMET_TOKEN: ${{ secrets.INMET_TOKEN }}
        run: |
          cd scripts
          python coleta_inmet.py

      - name: Coletar previsГѓВЈo meteorolГѓВіgica Open-Meteo (7 dias)
        run: |
          cd scripts
          python coleta_previsao.py

      - name: Processar dados e calcular indicadores
        run: |
          cd scripts
          python processa_dados.py
          python calcula_indicadores.py

      - name: Treinar modelo preditivo
        run: |
          cd scripts
          python modelo_preditivo.py

      - name: Verificar arquivos gerados
        run: |
          echo "=== VerificaГѓВ§ГѓВЈo de integridade ==="
          for f in data/internacoes_sc.csv data/clima_sc.csv data/dataset_final.csv \
                   data/indicadores_sc.json data/municipios_sc.json \
                   data/previsao_sc.json data/modelo_preditivo.json data/status_dados.json; do
            if [ -f "$f" ]; then
              linhas=$(wc -l < "$f")
              echo "ГўЕ“вЂ¦ $f Гўв‚¬вЂќ $linhas linhas"
            else
              echo "ГўЕЎВ ГЇВёВЏ  $f Гўв‚¬вЂќ NГѓЖ’O ENCONTRADO"
            fi
          done

      - name: Commit e push dos dados atualizados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "RespirAlert Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "Nenhuma alteraГѓВ§ГѓВЈo Гўв‚¬вЂќ commit pulado."
          else
            DATA_ATUAL=$(date +'%d/%m/%Y %H:%M UTC')
            git commit -m "chore(data): atualizaГѓВ§ГѓВЈo automГѓВЎtica Гўв‚¬вЂќ $DATA_ATUAL

          - internacoes_sc.csv atualizado (DATASUS/SIH-SUS)
          - clima_sc.csv atualizado (INMET)
          - previsao_sc.json atualizado (Open-Meteo 7 dias)
          - modelo_preditivo.json recalculado (regressГѓВЈo mГѓВєltipla)
          - indicadores_sc.json recalculados"
            git push
            echo "ГўЕ“вЂ¦ Publicado com sucesso!"
          fi

      - name: Resumo da execuГѓВ§ГѓВЈo
        if: always()
        run: |
          echo "### Г°ЕёвЂњЕ  RespirAlert SC Гўв‚¬вЂќ Resumo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for f in data/internacoes_sc.csv data/clima_sc.csv data/dataset_final.csv \
                   data/indicadores_sc.json data/previsao_sc.json data/modelo_preditivo.json data/status_dados.json; do
            if [ -f "$f" ]; then
              echo "| \`$f\` | ГўЕ“вЂ¦ OK |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$f\` | ГўВќЕ’ Ausente |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Executado em:** $(date +'%d/%m/%Y ГѓВ s %H:%M UTC')" >> $GITHUB_STEP_SUMMARY


<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=../index.html">
  <title>RespirAlert SC</title>
  <style>
    :root { --bg:#080e1c; --cyan:#00c2ff; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg);
      color:var(--cyan);
      font-family:'Inter',sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      gap:16px;
      text-align:center;
    }
    .logo { font-size:48px; }
    h1 { font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:800; letter-spacing:1px; }
    p  { font-size:13px; color:#4a6080; }
    a  { color:var(--cyan); text-decoration:none; border:1px solid rgba(0,194,255,0.4);
         padding:8px 20px; border-radius:8px; font-size:13px; }
    a:hover { background:rgba(0,194,255,0.1); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Inter:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo">🫁</div>
  <h1>RespirAlert SC</h1>
  <p>Redirecionando para o dashboard...</p>
  <a href="../index.html">Acessar agora →</a>
</body>
</html>
